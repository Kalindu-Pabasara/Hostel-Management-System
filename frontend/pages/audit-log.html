<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Log – HostelMS</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .log-row { display:flex; align-items:center; gap:14px; padding:12px 16px; border-bottom:1px solid var(--border); font-size:13px; }
    .log-row:last-child { border-bottom:none; }
    .log-icon { width:36px; height:36px; border-radius:8px; background:rgba(0,180,216,.12); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .log-ts   { font-size:11px; color:var(--text-muted); white-space:nowrap; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <div id="sidebar-placeholder"></div>
  <main class="layout-main">
    <div class="page-header">
      <div class="breadcrumb"><a href="rooms.html">Home</a> <span>›</span> Audit Log</div>
      <h1>📋 Activity Audit Log</h1>
      <p>Track all admin actions — room status changes, user management, and more.</p>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:13px;color:var(--text-muted);" id="logCount">Showing all entries</span>
        <button class="btn btn-outline btn-sm" onclick="loadLog()">↻ Refresh</button>
      </div>
      <div id="logList"><div style="padding:40px;text-align:center;color:var(--text-muted);">Loading…</div></div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js"></script>
  <script>
    const actionIcon = {
      room_status_change: '🏠', user_created:'👤', user_deleted:'🗑️',
      fee_structure_added:'💰', allocation_created:'🛏️', visitor_approved:'✅',
      visitor_rejected:'❌', payment_recorded:'💳', maintenance_updated:'🔧',
    };

    document.addEventListener('DOMContentLoaded', () => {
      requireAdmin();
      buildSidebar('audit-log');
      loadLog();
    });

    async function loadLog() {
      try {
        const d = await apiFetch('/audit');
        const el = document.getElementById('logList');
        document.getElementById('logCount').textContent = `${d.length} entries`;
        if (!d.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">No activity recorded yet. Actions will appear here.</div>'; return; }
        el.innerHTML = d.map(e => `
          <div class="log-row">
            <div class="log-icon">${actionIcon[e.action] || '📝'}</div>
            <div style="flex:1;">
              <strong>${e.action?.replace(/_/g,' ')}</strong>
              <div style="color:var(--text-muted);font-size:12px;">${e.detail || ''}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:12px;font-weight:600;">${e.user || 'System'}</div>
              <div class="log-ts">${e.ts ? new Date(e.ts).toLocaleString() : ''}</div>
            </div>
          </div>`).join('');
      } catch (e) {
        document.getElementById('logList').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">❌ Could not load audit log.</div>';
      }
    }
  </script>
</body>
</html>
